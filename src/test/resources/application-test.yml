spring:
  application:
    name: ween-backend-test
  datasource:
    url: jdbc:mysql://localhost:3306/ween_test
    username: test
    password: test
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

  redis:
    host: localhost
    port: 6379
    timeout: 60000ms

  flyway:
    enabled: false

  mail:
    host: localhost
    port: 1025

ween:
  jwt:
    secret: test-secret-key-for-testing-purposes-only-must-be-at-least-32-chars
    access-token-expiry: 900
    refresh-token-expiry: 604800
  qr:
    token-validity-hours: 24
