spring:
  application:
    name: ween-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/ween}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:admin}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true
        jdbc:
          batch_size: 10
        order_inserts: true
        order_updates: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:weenorganization@gmail.com}
    password: "${MAIL_PASSWORD:kkhs sgna fdfi kmyg}"
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  flyway:
    enabled: false
    # locations: classpath:db/migration

server:
  port: ${PORT:5000}
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.ween: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

ween:
  jwt:
    secret: ${JWT_SECRET:your-secret-key-min-32-characters-required}
    access-token-expiry: 900
    refresh-token-expiry: 604800
  aes:
    secret-key: ${AES_SECRET_KEY:16-character-key}
  firebase:
    credentials-path: ${FIREBASE_CREDS_PATH:/app/config/firebase-admin-key.json}
  mail:
    from: ${MAIL_FROM:weenorganization@gmail.com}
  frontend:
    verify-url: ${VERIFY_EMAIL_URL:http://localhost:5000/verify-email}
    reset-password-url: ${RESET_PASSWORD_URL:https://ween.az/change-password}
  api-key: ${ORGANIZER_API_KEY:your-api-key-here}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5000,http://localhost:5173,https://ween.az,https://api.ween.az}
  app:
    name: Ween

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs
