spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  redis:
    host: ${REDIS_HOST}
    port: 6379
    lettuce:
      pool:
        max-active: 30
        max-idle: 15
  mail:
    host: ${MAIL_HOST}
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: ${PORT:5000}
  compression:
    enabled: true
    min-response-size: 1024

logging:
  level:
    root: WARN
    com.ween: INFO
  file:
    name: /var/log/ween/application.log
    max-size: 10MB
    max-history: 10

ween:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiry: 900
    refresh-token-expiry: 604800
  aes:
    secret-key: ${AES_SECRET_KEY}
  firebase:
    credentials-path: ${FIREBASE_CREDS_PATH}
  mail:
    from: ${MAIL_FROM:noreply@ween.az}
  api-key: ${ORGANIZER_API_KEY}
  cors:
    allowed-origins: ${CORS_ORIGINS}
  app:
    name: Ween
