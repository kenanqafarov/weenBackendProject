spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ween_dev
    username: root
    password: password
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  redis:
    host: localhost
    port: 6379
  mail:
    host: localhost
    port: 1025

logging:
  level:
    root: DEBUG
    com.ween: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

ween:
  jwt:
    secret: dev-secret-key-min-32-characters-long-required
    access-token-expiry: 3600
    refresh-token-expiry: 604800
  aes:
    secret-key: dev-16-char-key1
  s3:
    endpoint: http://localhost:9000
    bucket: ween
    access-key: minioadmin
    secret-key: minioadmin
  api-key: dev-api-key-test
  cors:
    allowed-origins: http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000
