services:
  - type: web
    name: ween-backend
    env: docker
    plan: free
    region: frankfurt
    dockerfilePath: ./Dockerfile
    healthCheckPath: /actuator/health
    autoDeploy: true
    envVars:
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: PORT
        value: 5000
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false
      - key: MAIL_FROM
        value: weenorganization@gmail.com
      - key: JWT_SECRET
        sync: false
      - key: AES_SECRET_KEY
        sync: false
      - key: ORGANIZER_API_KEY
        sync: false
      - key: CORS_ORIGINS
        value: https://ween.az,https://www.ween.az,http://localhost:5173
      - key: VERIFY_EMAIL_URL
        value: https://ween.az/verify-email
      - key: RESET_PASSWORD_URL
        value: https://ween.az/change-password
